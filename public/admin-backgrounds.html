<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>inazu.me background photos</title>
    <meta name="robots" content="noindex,nofollow">
    <link rel="stylesheet" href="/analytics.css">
    <style>
        .slot-toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .upload-button {
            border: 1px solid rgba(120, 130, 160, 0.45);
            border-radius: 10px;
            background: rgba(70, 90, 140, 0.25);
            color: inherit;
            font: inherit;
            padding: 8px 14px;
            cursor: pointer;
        }

        .upload-button:hover,
        .upload-button:focus-visible {
            background: rgba(70, 90, 140, 0.45);
        }

        .upload-button:disabled {
            opacity: 0.5;
            cursor: progress;
        }

        .slot-status {
            font-size: 0.85rem;
            opacity: 0.8;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }

        .photo-card {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 4 / 3;
            background: rgba(20, 24, 36, 0.6);
        }

        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .photo-delete {
            position: absolute;
            top: 6px;
            right: 6px;
            border: none;
            border-radius: 8px;
            background: rgba(10, 12, 20, 0.7);
            color: #ff9a9a;
            font: inherit;
            font-size: 0.8rem;
            padding: 4px 8px;
            cursor: pointer;
        }

        .photo-delete:hover,
        .photo-delete:focus-visible {
            background: rgba(160, 40, 40, 0.85);
            color: #fff;
        }

        .photo-empty {
            opacity: 0.7;
            font-size: 0.9rem;
        }
    </style>
    <script src="/admin-backgrounds.js" defer></script>
</head>
<body>
    <header class="site-header">
        <a class="brand" href="/">inazu.me</a>
        <nav class="header-nav" aria-label="Admin navigation">
            <a href="/admin/analytics/raw">Admin raw</a>
            <a aria-current="page" href="/admin/backgrounds">Backgrounds</a>
        </nav>
    </header>

    <main class="analytics-shell">
        <section class="summary-band" aria-labelledby="backgrounds-title">
            <div>
                <h1 id="backgrounds-title">Background photos</h1>
                <p class="summary-copy">時間帯ごとの背景写真を追加・削除できます。アップロード時にEXIF/GPSは自動で除去され、最大2400pxに縮小されます。</p>
            </div>
        </section>

        <div data-slots></div>
    </main>
</body>
</html>
