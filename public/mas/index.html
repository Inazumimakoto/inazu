<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MAS Lab | inazu.me</title>
    <meta name="description" content="Local multi-agent simulation lab for mas.inazu.me">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/mas/style.css">
</head>

<body>
    <div class="app-shell">
        <main class="stage-shell">
            <canvas class="scene-canvas" data-scene-canvas aria-label="MAS simulation stage"></canvas>

            <div class="scene-overlay">
                <header class="site-header">
                    <a class="site-mark" href="/mas" aria-current="page">mas.inazu.me</a>
                    <button class="menu-toggle" type="button" data-menu-toggle aria-controls="control-panel"
                        aria-expanded="false">menu</button>
                </header>

                <form class="topic-composer" data-topic-form>
                    <label class="sr-only" for="topic-input">議題</label>
                    <div class="composer-bubble">
                        <textarea id="topic-input" name="topic" rows="1"
                            placeholder="議題を入力すると、エージェントが動き出します。"></textarea>
                        <button class="composer-submit" type="submit" aria-label="Apply topic">
                            <span aria-hidden="true">↗</span>
                        </button>
                    </div>
                </form>

                <aside id="control-panel" class="control-panel" data-control-panel aria-hidden="true">
                    <section class="panel history-panel">
                        <div class="panel-header compact">
                            <div>
                                <p class="section-label">Log</p>
                                <h2>Conversation stream</h2>
                            </div>
                        </div>

                        <ol class="log-list" data-log-list>
                            <li>まだ会話は始まっていません。</li>
                        </ol>
                    </section>
                </aside>

                <div class="hud-layer" data-hud-layer></div>
            </div>
        </main>
    </div>

    <script type="module" src="/mas/app.js"></script>
</body>

</html>
